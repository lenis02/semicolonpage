<div
  *ngIf="!authService.isLoggedIn() && !isAuthCallbackRoute()"
  class="min-h-screen flex items-center justify-center bg-white relative overflow-hidden"
>
  <div
    class="absolute inset-0 opacity-40"
    style="background-image: radial-gradient(circle at 20% 20%, rgba(59,130,246,0.12), transparent 35%), radial-gradient(circle at 80% 30%, rgba(168,85,247,0.12), transparent 35%), radial-gradient(circle at 50% 80%, rgba(16,185,129,0.1), transparent 30%);"
  ></div>
  <div
    class="max-w-md w-full p-8 bg-white shadow-xl text-center border border-gray-100 relative"
  >
    <h1 class="text-2xl font-bold text-gray-800 mb-2">프리랜서 대시보드</h1>
    <p class="text-gray-500 mb-8 text-sm">
      업무 효율을 높이는 나만의 공간입니다.<br />로그인하고 시작해 보세요.
    </p>
    <button
      (click)="loginWithGoogle()"
      class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:opacity-90 text-white font-semibold py-3 px-4 transition duration-200 shadow-md cursor-pointer"
    >
      Google로 시작하기
    </button>
    <button
      (click)="loginWithKakao()"
      class="w-full bg-gradient-to-r from-sky-600 to-indigo-600 hover:opacity-90 text-white font-semibold py-3 px-4 transition duration-200 shadow-md cursor-pointer"
    >
      카카오로 시작하기
    </button>
  </div>
</div>

<div
  *ngIf="!authService.isLoggedIn() && isAuthCallbackRoute()"
  class="min-h-screen flex items-center justify-center bg-white"
>
  <router-outlet></router-outlet>
</div>

<div
  *ngIf="authService.isLoggedIn()"
  class="flex h-screen bg-white font-sans overflow-hidden relative"
>
  <div
    class="absolute inset-0 opacity-35 pointer-events-none"
    style="background-image: radial-gradient(circle at 10% 10%, rgba(59,130,246,0.1), transparent 30%), radial-gradient(circle at 90% 20%, rgba(147,51,234,0.08), transparent 35%), radial-gradient(circle at 60% 90%, rgba(14,165,233,0.08), transparent 30%);"
  ></div>
  <aside
    class="w-64 bg-white/90 backdrop-blur shadow-[1px_0_10px_rgba(0,0,0,0.05)] flex flex-col z-10 border-r border-gray-100"
  >
    <div class="p-6 border-b border-gray-100">
      <a
        [routerLink]="['/dashboard']"
        class="text-2xl font-black bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent tracking-tight cursor-pointer"
      >
        Selu Dash
      </a>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a
        [routerLink]="['/dashboard']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition cursor-pointer"
      >
        <span>대시보드</span>
      </a>
      <a
        [routerLink]="['/clients']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition cursor-pointer"
      >
        <span>클라이언트</span>
      </a>
      <a
        [routerLink]="['/projects']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition cursor-pointer"
      >
        <span>프로젝트</span>
      </a>
      <a
        [routerLink]="['/tasks']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition cursor-pointer"
      >
        <span>할 일 (Tasks)</span>
      </a>
      <a
        [routerLink]="['/revenue']"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
        class="flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition cursor-pointer"
      >
        <span>매출 정산</span>
      </a>
    </nav>

    <div class="p-4 border-t border-gray-100">
      <button
        (click)="logout()"
        class="w-full px-4 py-2.5 text-sm text-gray-500 font-medium hover:bg-red-50 hover:text-red-600 transition cursor-pointer"
      >
        로그아웃
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden relative">
    <header
      class="bg-white/70 backdrop-blur-md shadow-sm p-6 flex justify-between items-center z-10 border-b border-gray-100"
    >
      <h2 class="text-xl font-bold text-gray-800">관리 대시보드</h2>
      <div class="flex items-center gap-4">
        <span
          class="text-sm font-medium text-gray-500 bg-gradient-to-r from-slate-100 to-gray-100 px-3 py-1"
          >개발자 모드</span
        >
      </div>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>
